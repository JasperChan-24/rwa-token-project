name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Contract and frontend quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      # Keep Hardhat operations sequential. Its compiler download cache uses a
      # process mutex and parallel compile/test jobs can create false failures.
      - name: Compile contracts and export ABI
        run: npm run compile

      - name: Export verification input
        run: npm run export:verification

      - name: Reject stale generated contract files
        run: >-
          git diff --exit-code --
          abi/PropertyToken.json
          src/contracts/generated/propertyTokenAbi.ts
          verification/PropertyToken.standard-input.json

      - name: Test contracts
        run: npm test

      - name: Test frontend copy
        run: npm run test:frontend

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run frontend end-to-end tests
        run: npm run test:e2e

      - name: Audit production dependencies
        run: npm audit --omit=dev
