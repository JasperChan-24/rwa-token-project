[profile.default]
src = "contracts"
test = "test-foundry"
out = "out-foundry"
cache_path = "cache-foundry"
snapshots = "test-foundry/gas/snapshots"
libs = ["lib", "node_modules"]
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
build_info = true
isolate = true
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 64
depth = 32
fail_on_revert = true

[profile.ci.fuzz]
runs = 1024

[profile.ci.invariant]
runs = 256
depth = 64
fail_on_revert = true
